<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>הגשת עבודה</title>
</head>
<body>

<h2>טופס הגשת עבודה</h2>

<form id="myForm">
  <input type="text" name="name" placeholder="שם מלא" required><br><br>
  <input type="email" name="email" placeholder="אימייל" required><br><br>
  <textarea name="content" placeholder="הדבק כאן את המאמר שלך" required></textarea><br><br>
  
  <button type="submit">שלח</button>
</form>

<p id="status"></p>

<script>
document.getElementById("myForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    name: this.name.value,
    email: this.email.value,
    content: this.content.value
  };

  fetch("https://hook.eu1.make.com/tulqyuukh1jm34jt5ogy4c7rruostyvg", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(response => {
    document.getElementById("status").innerText = "נשלח בהצלחה!";
    document.getElementById("myForm").reset();
  })
  .catch(error => {
    document.getElementById("status").innerText = "שגיאה בשליחה";
  });
});
</script>

</body>
</html>
